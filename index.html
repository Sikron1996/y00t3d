<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The y00ts 3D</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="color-bg"></div>

<main class="page">
  <section class="hero">
    <p class="supply">TOTAL SUPPLY · 10,000</p>
    <h1>The y00ts 3D<br></h1>
    <p class="sub">1st NFT free. 3D y00ts reborn on Ethereum.</p>

    <div class="layout">
      <div class="image-card">
        <img src="assets/bg-logo.jpg" alt="The y00ts 3D">
        <div class="card-footer">
          <b>The y00ts 3D</b>
          <span>live mint</span>
        </div>
      </div>

      <div class="mint-card" id="mint">
        <div class="row">
          <span>MINTED</span>
          <b><span id="mintedText">0</span> / 10000</b>
        </div>
        <div class="row">
          <span>PRICE</span>
          <b id="priceText">FREE</b>
        </div>

        <div class="counter">
          <button id="minus" type="button">−</button>
          <input id="amount" value="1" inputmode="numeric">
          <button id="plus" type="button">+</button>
        </div>

        <button id="connectBtn" class="main-btn" type="button">CONNECT WALLET</button>
        <button id="mintBtn" class="main-btn hiddenBtn" type="button">MINT NOW</button>

        <p id="wallet">not connected</p>
        <p id="status"></p>
      </div>
    </div>

    <nav class="links">
      <a href="https://opensea.io/" target="_blank">OpenSea</a>
      <a href="https://x.com/" target="_blank">X / Twitter</a>
      <a id="etherscanLink" href="https://etherscan.io/" target="_blank">Etherscan</a>
    </nav>
  </section>
</main>

<div id="walletModal" class="modal hidden">
  <div class="modal-card">
    <button id="closeModalBtn" class="close" type="button">×</button>
    <h3>Connect Wallet</h3>
    <button id="browserWalletBtn" type="button">MetaMask / Rabby / OKX</button>
    <button id="walletConnectBtn" type="button">WalletConnect / Mobile</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
